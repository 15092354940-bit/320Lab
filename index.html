<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>320实验室仪器预约系统</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="container">
      <h1 class="page-title">320实验室仪器预约系统</h1>

      <div class="main-layout">
        <section class="panel left-panel">
          <div class="panel-header">
            <h2>仪器列表</h2>
          </div>
          <div class="panel-body">
            <div class="form-group">
              <label for="searchInput">关键词</label>
              <input id="searchInput" type="text" placeholder="搜索仪器名称、别名或分类" />
            </div>

            <div class="form-group">
              <label for="categorySelect">分类</label>
              <select id="categorySelect"></select>
            </div>

            <div id="instrumentList" class="instrument-list"></div>
          </div>
        </section>

        <div class="right-panel">
          <section class="panel">
            <div class="panel-header">
              <h2>当前仪器信息</h2>
            </div>
            <div class="panel-body">
              <div class="info-grid">
                <div class="info-card">
                  <div class="info-label">装置名称</div>
                  <div id="infoName" class="info-value"></div>
                  <div id="infoAlias" class="info-sub"></div>
                </div>

                <div class="info-card">
                  <div class="info-label">位置 / 数量</div>
                  <div id="infoMeta" class="info-value"></div>
                </div>

                <div class="info-card info-card-wide">
                  <div class="info-label">预约规则</div>
                  <div id="infoRules" class="info-value rules-text"></div>
                </div>
              </div>
            </div>
          </section>

          <div class="sub-grid">
            <section class="panel">
              <div class="panel-header">
                <h2>提交预约</h2>
              </div>
              <div class="panel-body">
                <div class="form-group">
                  <label for="userInput">预约人</label>
                  <input id="userInput" type="text" value="Lin" />
                </div>

                <div class="time-grid">
                  <div class="form-group">
                    <label for="dateInput">日期</label>
                    <input id="dateInput" type="date" value="2026-04-23" />
                  </div>

                  <div class="form-group">
                    <label for="startTimeInput">开始时间</label>
                    <input id="startTimeInput" type="text" value="09:00" placeholder="00:30" />
                  </div>

                  <div class="form-group">
                    <label for="endTimeInput">结束时间</label>
                    <input id="endTimeInput" type="text" value="11:00" placeholder="24:00" />
                  </div>
                </div>

                <div class="hint-text">请直接输入 24 小时制时间，例如 00:30、14:00、24:00。</div>

                <div class="form-group">
                  <label for="purposeInput">测试目的 / 样品信息</label>
                  <textarea id="purposeInput" rows="4">样品测试</textarea>
                </div>

                <div id="statusBox" class="status-box"></div>

                <div class="btn-row">
                  <button id="reserveBtn" class="btn btn-primary">立即预约</button>
                  <button id="toggleScheduleBtn" class="btn btn-secondary">查看当日排程</button>
                </div>

                <div id="dayScheduleWrap" class="day-schedule-wrap hidden">
                  <div id="dayScheduleList" class="booking-list"></div>
                </div>

                <div id="messageBox" class="message-box"></div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-header">
                <h2>当日预约</h2>
              </div>
              <div class="panel-body">
                <div id="dayBookingList" class="booking-list"></div>
              </div>
            </section>
          </div>
        </div>
      </div>

      <section class="panel calendar-panel">
        <div class="panel-header panel-header-row">
          <h2 id="calendarTitle">当周仪器预约情况</h2>
          <div class="calendar-switch">
            <button id="weekBtn" class="btn btn-primary">当周</button>
            <button id="monthBtn" class="btn btn-secondary">当月</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="calendarContainer"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  <script src="script.js"></script>
</body>
</html>
